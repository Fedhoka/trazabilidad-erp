<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="trazabilidad">
  <rect width="64" height="64" rx="14" fill="#9c4221"/>
  <!-- Lowercase 't' constructed from rectangles to avoid font dependency in SVG -->
  <rect x="22" y="14" width="6" height="36" rx="2" fill="#fff8ec"/>
  <rect x="14" y="22" width="22" height="6" rx="2" fill="#fff8ec"/>
  <!-- Brand accent dot — appears between letters in the wordmark -->
  <circle cx="46" cy="46" r="4" fill="#fff8ec"/>
</svg>
