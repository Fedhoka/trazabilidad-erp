user  nginx;
worker_processes  auto;               # one worker per CPU core

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';
    access_log  /var/log/nginx/access.log  main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;           # hide Nginx version from responses

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip               on;
    gzip_vary          on;
    gzip_proxied       any;
    gzip_comp_level    6;
    gzip_min_length    256;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/xml+rss application/x-javascript
        image/svg+xml;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # General zone: 60 r/m per IP (matches API throttle default)
    limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;
    # Stricter zone for auth endpoints: 10 r/m per IP
    limit_req_zone $binary_remote_addr zone=auth:10m     rate=10r/m;

    # ── Proxy buffer tuning ───────────────────────────────────────────────────
    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;

    # ── Client body size (for file uploads if needed) ─────────────────────────
    client_max_body_size  10m;

    # ── Include virtual host configs ──────────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
