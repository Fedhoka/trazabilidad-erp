# ── Upstream definitions ──────────────────────────────────────────────────────
upstream api_backend {
    server api:4000;
    keepalive 32;
}

upstream web_backend {
    server web:3000;
    keepalive 16;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name ${DOMAIN} www.${DOMAIN};

    # Certbot ACME challenge — must remain on HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else: permanent redirect to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name ${DOMAIN} www.${DOMAIN};

    # ── TLS certificates (managed by Certbot / Let's Encrypt) ────────────────
    ssl_certificate     /etc/nginx/ssl/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/${DOMAIN}/privkey.pem;

    # Mozilla "Intermediate" TLS configuration (TLS 1.2 + 1.3)
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout       1d;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           DENY always;
    add_header X-Content-Type-Options    nosniff always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── API proxy  (/api/*) ───────────────────────────────────────────────────
    location /api/ {
        # Stricter rate limit for auth endpoints
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://api_backend;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        limit_req zone=general burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://api_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Next.js web app (everything else) ────────────────────────────────────
    location / {
        limit_req zone=general burst=30 nodelay;
        limit_req_status 429;

        proxy_pass http://web_backend;
        include /etc/nginx/conf.d/proxy_params.conf;

        # Next.js hot-reload WebSocket (dev only — no-op in prod)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Static asset caching ──────────────────────────────────────────────────
    location /_next/static/ {
        proxy_pass http://web_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location /favicon.ico {
        proxy_pass http://web_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
        access_log off;
        expires 30d;
    }
}
