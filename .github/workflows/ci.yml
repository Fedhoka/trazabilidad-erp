name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs on the same branch when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

# ─────────────────────────────────────────────────────────────────────────────
# Job 1 — Lint + build + unit tests (no database required)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  quality:
    name: Lint, build & unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── API ──────────────────────────────────────────────────────────────────
      - name: Lint API
        working-directory: apps/api
        run: pnpm lint

      - name: Build API
        working-directory: apps/api
        run: pnpm build

      - name: Unit tests (API)
        working-directory: apps/api
        run: pnpm test -- --forceExit --ci
        env:
          NODE_ENV: test

      # ── Web ──────────────────────────────────────────────────────────────────
      - name: Build web
        working-directory: apps/web
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
          NEXT_TELEMETRY_DISABLED: "1"

# ─────────────────────────────────────────────────────────────────────────────
# Job 2 — E2E tests against a real Postgres database
# ─────────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: quality          # only run if quality job passes

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: trazabilidad
          POSTGRES_PASSWORD: trazabilidad
          POSTGRES_DB: trazabilidad          # main db (migrations target)
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trazabilidad"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create test database
        run: |
          PGPASSWORD=trazabilidad psql -h localhost -U trazabilidad -c \
            "CREATE DATABASE trazabilidad_test;"

      - name: Run E2E tests
        working-directory: apps/api
        run: pnpm test:e2e --forceExit
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: trazabilidad
          DB_PASSWORD: trazabilidad
          DB_NAME: trazabilidad_test
          DB_LOGGING: "false"
          JWT_SECRET: ci-test-jwt-secret-must-be-32chars-min
          JWT_REFRESH_SECRET: ci-test-refresh-secret-32chars-min!!
          JWT_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 7d
          AFIP_ENV: mock
          THROTTLE_TTL_MS: "60000"
          THROTTLE_LIMIT: "9999"
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          APP_URL: http://localhost:3000
          API_PORT: "4001"

# ─────────────────────────────────────────────────────────────────────────────
# Job 3 — Docker image smoke test (push to main only)
# ─────────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker image build (smoke test)
    runs-on: ubuntu-latest
    needs: [quality, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: trazabilidad-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build web image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: trazabilidad-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:4000/api/v1
