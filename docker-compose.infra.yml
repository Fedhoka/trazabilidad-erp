services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trazabilidad
      POSTGRES_PASSWORD: trazabilidad
      POSTGRES_DB: trazabilidad
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trazabilidad"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
